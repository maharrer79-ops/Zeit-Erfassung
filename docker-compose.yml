# ZeitWerk – Docker Compose
# Start:  docker compose up -d --build
# Logs:   docker compose logs -f
# Stop:   docker compose down   (Daten bleiben im Volume erhalten)
#
# WICHTIG: Lege eine .env-Datei neben dieser Datei an mit mindestens:
#   JWT_SECRET=<openssl rand -hex 32>
# (siehe .env.example)

services:
  zeitwerk:
    build: .
    container_name: zeitwerk
    restart: unless-stopped
    # Nur lokal binden (127.0.0.1) – der Nginx-Reverse-Proxy macht HTTPS nach aussen.
    # Fuer direkten Test ohne Nginx: "3000:3000" verwenden.
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:?Bitte JWT_SECRET in .env setzen}
      DB_PATH: /data/data.sqlite
    volumes:
      - zeitwerk_data:/data

volumes:
  zeitwerk_data:
