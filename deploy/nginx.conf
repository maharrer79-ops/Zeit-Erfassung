# ZeitWerk – Nginx Reverse Proxy
# Ablage auf dem VPS: /etc/nginx/sites-available/zeitwerk
# Aktivieren:  sudo ln -s /etc/nginx/sites-available/zeitwerk /etc/nginx/sites-enabled/
#              sudo nginx -t && sudo systemctl reload nginx
#
# HINWEIS: Diese Datei enthaelt zunaechst nur den HTTP-Block (Port 80).
# Das HTTPS-Zertifikat traegt "certbot" nach dem ersten Start automatisch ein
# (siehe DEPLOY.md, Schritt 6). Danach leitet Nginx HTTP -> HTTPS um.

server {
    listen 80;
    listen [::]:80;

    # >>> Deine (Sub-)Domain hier eintragen <<<
    server_name zeit.deinedomain.de;

    # Anfragen an die Node-App (laeuft lokal auf Port 3000) weiterreichen
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Etwas groessere Uploads/Exports erlauben
    client_max_body_size 5m;
}
